
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#F7F5EB" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <title>Finance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      background: #0F1117;
      font-family: 'Inter', sans-serif;
      color: #202A2D;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input, button { font-family: inherit; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD0B5; border-radius: 4px; }

    /* Entry animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.8s ease-out both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.12s; }
    .fade-up-3 { animation-delay: 0.19s; }
    .fade-up-4 { animation-delay: 0.26s; }

    /* Pill buttons */
    .btn-pill {
      border-radius: 999px;
      padding: 10px 22px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      border: 1.5px solid #202A2D;
      background: #202A2D;
      color: #F7F5EB;
      transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
      font-family: inherit;
    }
    .btn-pill:hover { background: #CBD0B5; color: #202A2D; border-color: #CBD0B5; }

    .btn-pill-outline {
      border-radius: 999px;
      padding: 10px 22px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      border: 1.5px solid #CBD0B5;
      background: transparent;
      color: #202A2D;
      transition: background 0.25s ease, color 0.25s ease;
      font-family: inherit;
    }
    .btn-pill-outline:hover { background: #CBD0B5; }

    /* Tab active state */
    .tab-active {
      background: #202A2D !important;
      color: #F7F5EB !important;
      border-color: #202A2D !important;
    }

    /* Input fields */
    .field {
      background: #F0EDE1;
      border: 1.5px solid #CBD0B5;
      border-radius: 12px;
      color: #202A2D;
      font-size: 15px;
      padding: 10px 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      width: 100%;
      box-sizing: border-box;
    }
    .field:focus { border-color: #202A2D; box-shadow: 0 0 0 3px rgba(203,208,181,0.4); }
    .field-mono { font-family: 'DM Mono', monospace; }
    .field-right { text-align: right; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ─── SUPABASE CONFIG ──────────────────────────────────────────────────────────
// Paste your Supabase credentials here after setup:
const SUPABASE_URL = "https://xwrrryobwimidamfasmd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3cnJyeW9id2ltaWRhbWZhc21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDU2NzcsImV4cCI6MjA4ODg4MTY3N30.Uem-Ki_Hwxu8IkMWMjBw5_PvVL_0JGFfL9uWIruiqbA";
const SUPABASE_USER_ID = "cheryl";

const supabase = (SUPABASE_URL !== "YOUR_SUPABASE_URL")
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

// ─── STORAGE LAYER ────────────────────────────────────────────────────────────
// Writes to both localStorage (instant) and Supabase (cloud sync).
// Reads from Supabase on first load; falls back to localStorage if offline.

let _syncStatus = "idle"; // "idle" | "syncing" | "ok" | "error"
const _syncListeners = new Set();
function setSyncStatus(s) { _syncStatus = s; _syncListeners.forEach(fn => fn(s)); }
function onSyncStatus(fn) { _syncListeners.add(fn); return () => _syncListeners.delete(fn); }
function getSyncStatus() { return _syncStatus; }

const STORAGE_KEYS = ["monthly-tracker","budget-overrides","sf-funds","bonus-allocation-v2","theme"];

async function dbLoad() {
  if (!supabase) return null;
  try {
    const { data, error } = await supabase
      .from("finance_data")
      .select("*")
      .eq("user_id", SUPABASE_USER_ID)
      .single();
    if (error && error.code !== "PGRST116") throw error; // PGRST116 = no rows
    return data?.payload || null;
  } catch { return null; }
}

async function dbSave(payload) {
  if (!supabase) return;
  setSyncStatus("syncing");
  try {
    const { error } = await supabase
      .from("finance_data")
      .upsert({ user_id: SUPABASE_USER_ID, payload, updated_at: new Date().toISOString() },
               { onConflict: "user_id" });
    if (error) throw error;
    setSyncStatus("ok");
  } catch { setSyncStatus("error"); }
}

// Debounced cloud save — batches rapid writes into one request
let _saveTimer = null;
let _pendingPayload = null;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    const payload = {};
    STORAGE_KEYS.forEach(k => { const v = localStorage.getItem(k); if (v) payload[k] = v; });
    await dbSave(payload);
  }, 1500);
}

function lsGet(key) {
  try { return localStorage.getItem(key); } catch { return null; }
}
function lsSet(key, value) {
  try {
    localStorage.setItem(key, value);
    scheduleSave();
  } catch {}
}

// On app start: pull from Supabase and hydrate localStorage
async function hydrateFromCloud() {
  const payload = await dbLoad();
  if (!payload) return false;
  STORAGE_KEYS.forEach(k => { if (payload[k]) localStorage.setItem(k, payload[k]); });
  return true;
}

// ─── THEME ───────────────────────────────────────────────────────────────────
const DARK = {
  BG:"#0F1117",CARD:"#181C27",BORDER:"#252A3A",TEXT:"#E8EAF0",MUTED:"#7A8099",
  GREEN:"#5BC8A0",YELLOW:"#E8C547",RED:"#E8547A",BLUE:"#5B8DB8",PURPLE:"#A78BD4",ORANGE:"#E07B4F",
  PALETTE:["#A78BD4","#5BC8A0","#F4845F","#E8C547","#5B8DB8","#E07B4F","#E8547A","#7EC8C8","#F0A500","#B0C4DE"],
};
const LIGHT = {
  BG:"#F7F5EB",CARD:"#EDE9DC",BORDER:"#C2BDA8",TEXT:"#202A2D",MUTED:"#5C6260",
  GREEN:"#1F5C3E",YELLOW:"#5C4A10",RED:"#7A2020",BLUE:"#1E3F5C",PURPLE:"#3D2E60",ORANGE:"#6B3618",
  PALETTE:["#3D2E60","#1F5C3E","#6B3618","#5C4A10","#1E3F5C","#7A2020","#2A5C40","#1A4A5C","#5C3A18","#2E2048"],
};
let BG=DARK.BG,CARD=DARK.CARD,BORDER=DARK.BORDER,TEXT=DARK.TEXT,MUTED=DARK.MUTED;
let GREEN=DARK.GREEN,YELLOW=DARK.YELLOW,RED=DARK.RED,BLUE=DARK.BLUE,PURPLE=DARK.PURPLE,ORANGE=DARK.ORANGE;
let SAGE="#CBD0B5",PALETTE=DARK.PALETTE;
function applyTheme(t){
  BG=t.BG;CARD=t.CARD;BORDER=t.BORDER;TEXT=t.TEXT;MUTED=t.MUTED;
  GREEN=t.GREEN;YELLOW=t.YELLOW;RED=t.RED;BLUE=t.BLUE;PURPLE=t.PURPLE;ORANGE=t.ORANGE;
  PALETTE=t.PALETTE;
  document.body.style.background=BG;
  document.body.style.color=TEXT;
}

const fmt = n => "SGD " + Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => new Date(d).toLocaleDateString("en-SG",{day:"2-digit",month:"short",year:"numeric"});
const today = () => new Date().toISOString().split("T")[0];
const inp = (extra={}) => ({background:CARD,border:`1.5px solid ${BORDER}`,borderRadius:12,color:TEXT,fontSize:15,padding:"10px 14px",fontFamily:"inherit",outline:"none",boxSizing:"border-box",width:"100%",...extra});

// ─── SINKING FUNDS ───────────────────────────────────────────────────────────
const INSURANCE_MILESTONES = [
  { month:"July 2026", date:"2026-07-01", color:RED, items:[
    {label:"GE Whole Life",amount:1892.40},{label:"GE Hospitalisation",amount:401.00},
    {label:"Singlife ECI",amount:1452.00},{label:"Singlife Comprehensive CI",amount:1522.50},
    {label:"Careshield Life Cash",amount:391.78},{label:"CPF MA Top-up (Careshield)",amount:600.00},
  ]},
  { month:"October 2026", date:"2026-10-01", color:ORANGE, items:[
    {label:"Singlife Term",amount:584.75},{label:"CPF MA Top-up (Careshield)",amount:838.28},
  ]},
];

const FUND_META = [
  {id:"travel",   name:"Travel",           icon:"✈",  color:YELLOW,  monthlyAdd:800 },
  {id:"insurance",name:"Insurance",         icon:"🛡", color:BLUE,    monthlyAdd:540 },
  {id:"home",     name:"4TP Maintenance",   icon:"🔧", color:GREEN,   monthlyAdd:165 },
  {id:"newhome",  name:"New Home",          icon:"🏠", color:PURPLE,  monthlyAdd:1200},
];

const DEFAULT_BALANCES = {travel:431.51, insurance:1327.55, home:347.69, newhome:235415};

const initFunds = () => FUND_META.reduce((acc,f) => ({
  ...acc,
  [f.id]: { balance:DEFAULT_BALANCES[f.id], txns:[{id:1,type:"opening",note:"Opening balance",amount:0,date:today(),balance:DEFAULT_BALANCES[f.id]}] }
}), {});

function projectedBalance(currentBalance, monthlyAdd, targetMonthIndex) {
  const cur = new Date().getMonth();
  return currentBalance + monthlyAdd * Math.max(0, targetMonthIndex - cur);
}

function SinkingFunds() {
  const [funds, setFunds] = useState(() => { try { const s=lsGet("sf-funds"); return s?JSON.parse(s):initFunds(); } catch{ return initFunds(); }});
  const [activeId, setActiveId] = useState("travel");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({amount:"",note:"",date:today()});
  const [formError, setFormError] = useState("");
  const [showShortfall, setShowShortfall] = useState(false);
  const [showTxns, setShowTxns] = useState(true);

  useEffect(() => { try{ lsSet("sf-funds", JSON.stringify(funds)); }catch{} }, [funds]);

  const activeFund = FUND_META.find(f=>f.id===activeId);
  const activeData = funds[activeId];
  const totalBalance = FUND_META.reduce((s,f)=>s+funds[f.id].balance, 0);

  const ins = useMemo(() => {
    const bal = funds.insurance.balance, mo = 540;
    const projJuly = projectedBalance(bal, mo, 6);
    const julyTotal = INSURANCE_MILESTONES[0].items.reduce((s,i)=>s+i.amount,0);
    const julyShortfall = julyTotal - projJuly;
    const afterJuly = Math.max(0, projJuly - julyTotal);
    const projOct = afterJuly + mo*3;
    const octTotal = INSURANCE_MILESTONES[1].items.reduce((s,i)=>s+i.amount,0);
    const octShortfall = octTotal - projOct;
    const extraMonthly = julyShortfall>0 ? Math.ceil(julyShortfall/4) : 0;
    return {projJuly,julyTotal,julyShortfall,projOct,octTotal,octShortfall,extraMonthly};
  }, [funds.insurance.balance]);

  const openModal = type => { setForm({amount:"",note:"",date:today()}); setFormError(""); setModal({type,fundId:activeId}); };
  const closeModal = () => { setModal(null); setFormError(""); };

  const rebalance = (txns) => {
    const ordered = [...txns].reverse();
    let running = 0;
    return ordered.map(t => {
      if (t.type === "opening") { running = t.balance; return t; }
      running += t.amount;
      return {...t, balance: Math.round(running * 100) / 100};
    }).reverse();
  };

  const submitTxn = () => {
    const amt = parseFloat(form.amount);
    if (!form.amount||isNaN(amt)||amt<=0){ setFormError("Enter a valid amount."); return; }
    const isEdit = modal.type === "edit";
    const isDeposit = isEdit ? modal.origAmount >= 0 : modal.type === "deposit";
    if (isEdit) {
      setFunds(prev => {
        const fund = prev[modal.fundId];
        const newAmount = isDeposit ? amt : -amt;
        const updated = fund.txns.map(t => t.id === modal.txnId ? {...t, amount:newAmount, note:form.note.trim()||t.note, date:form.date} : t);
        const rebalanced = rebalance(updated);
        return {...prev, [modal.fundId]: {balance: rebalanced[0].balance, txns: rebalanced}};
      });
    } else {
      if (modal.type==="withdraw"&&amt>funds[modal.fundId].balance){ setFormError(`Max: ${fmt(funds[modal.fundId].balance)}`); return; }
      setFunds(prev => {
        const fund = prev[modal.fundId];
        const newBal = isDeposit ? fund.balance+amt : fund.balance-amt;
        const txn = {id:Date.now(),type:modal.type,amount:isDeposit?amt:-amt,note:form.note.trim()||(isDeposit?"Deposit":"Withdrawal"),date:form.date,balance:newBal};
        return {...prev,[modal.fundId]:{balance:newBal,txns:[txn,...fund.txns]}};
      });
    }
    closeModal();
  };

  const openEditModal = (txn) => {
    setForm({amount:String(Math.abs(txn.amount)), note:txn.note, date:txn.date});
    setFormError("");
    setModal({type:"edit", fundId:activeId, txnId:txn.id, origAmount:txn.amount});
  };

  const deleteTxn = (txnId) => {
    setFunds(prev => {
      const fund = prev[activeId];
      const filtered = fund.txns.filter(t => t.id !== txnId);
      const rebalanced = rebalance(filtered);
      return {...prev, [activeId]: {balance: rebalanced[0]?.balance ?? 0, txns: rebalanced}};
    });
  };

  return (
    <div style={{padding:"16px 16px 8px"}}>
      {/* Total */}
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em"}}>Total Across All Funds</div>
        <div style={{fontSize:28,fontWeight:700,fontFamily:"'DM Mono',monospace",color:GREEN,marginTop:2}}>{fmt(totalBalance)}</div>
      </div>

      {/* Fund cards grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {FUND_META.map(f => {
          const isActive = f.id===activeId;
          const hasAlert = f.id==="insurance"&&ins.julyShortfall>0;
          return (
            <div key={f.id} onClick={()=>setActiveId(f.id)} style={{background:isActive?`${f.color}18`:CARD,border:`1px solid ${isActive?f.color:BORDER}`,borderTop:`3px solid ${f.color}`,borderRadius:12,padding:"14px 12px",cursor:"pointer",position:"relative"}}>
              {hasAlert && <div style={{position:"absolute",top:8,right:8,width:7,height:7,borderRadius:"50%",background:RED}}/>}
              <div style={{fontSize:22,marginBottom:6}}>{f.icon}</div>
              <div style={{fontSize:10,color:MUTED,marginBottom:2}}>{f.name}</div>
              <div style={{fontSize:15,fontWeight:700,fontFamily:"'DM Mono',monospace",color:f.color}}>{fmt(funds[f.id].balance)}</div>
              <div style={{fontSize:10,color:f.color,marginTop:4,opacity:0.8}}>+{fmt(f.monthlyAdd).replace("SGD ","")}/mo</div>
            </div>
          );
        })}
      </div>

      {/* Active fund */}
      <div style={{background:CARD,border:`1px solid ${activeFund.color}44`,borderRadius:12,overflow:"hidden",marginBottom:12}}>
        <div style={{padding:"14px 16px",background:`${activeFund.color}0C`,borderBottom:`1px solid ${BORDER}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:700,fontSize:15}}>{activeFund.icon} {activeFund.name}</div>
              <div style={{fontSize:12,color:MUTED,fontFamily:"'DM Mono',monospace",marginTop:2}}>
                Balance: <span style={{color:activeFund.color,fontWeight:700}}>{fmt(activeData.balance)}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>openModal("deposit")} style={{padding:"9px 14px",borderRadius:8,border:`1px solid ${GREEN}`,background:`${GREEN}20`,color:GREEN,fontWeight:700,fontSize:13,cursor:"pointer"}}>+ Add</button>
              <button onClick={()=>openModal("withdraw")} style={{padding:"9px 14px",borderRadius:8,border:`1px solid ${RED}`,background:`${RED}20`,color:RED,fontWeight:700,fontSize:13,cursor:"pointer"}}>− Use</button>
            </div>
          </div>
        </div>

        <button onClick={()=>setShowTxns(s=>!s)} style={{width:"100%",background:"none",border:"none",borderBottom:showTxns?`1px solid ${BORDER}`:"none",padding:"10px 16px",color:MUTED,fontSize:12,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between"}}>
          <span>Transaction History ({activeData.txns.length})</span>
          <span>{showTxns?"▲":"▼"}</span>
        </button>

        {showTxns && (
          <div style={{maxHeight:320,overflowY:"auto"}}>
            {activeData.txns.map((txn,i)=>{
              const isDeposit=txn.amount>=0, isOpening=txn.type==="opening";
              return (
                <div key={txn.id} style={{padding:"10px 16px",borderBottom:i<activeData.txns.length-1?`1px solid ${BORDER}`:"none",background:i%2===0?"transparent":"#13161F"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,color:isOpening?MUTED:TEXT,fontStyle:isOpening?"italic":"normal",marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{txn.note}</div>
                      <div style={{fontSize:11,color:MUTED}}>{fmtDate(txn.date)}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:600,color:isOpening?MUTED:isDeposit?GREEN:RED}}>
                        {isOpening?"—":(isDeposit?"+":"−")+fmt(Math.abs(txn.amount)).replace("SGD ","")}
                      </div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:MUTED}}>{fmt(txn.balance)}</div>
                    </div>
                    {!isOpening && (
                      <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                        <button onClick={()=>openEditModal(txn)} title="Edit" style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:6,width:28,height:28,color:MUTED,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>&#x270E;</button>
                        <button onClick={()=>{ if(window.confirm("Delete this transaction? Balances will be recalculated.")) deleteTxn(txn.id); }} title="Delete" style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:6,width:28,height:28,color:RED,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>&#x2715;</button>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Insurance shortfall */}
      {activeId==="insurance" && (
        <div style={{marginBottom:12}}>
          <button onClick={()=>setShowShortfall(s=>!s)} style={{width:"100%",background:CARD,border:`1px solid ${showShortfall?BLUE:BORDER}`,borderRadius:showShortfall?"12px 12px 0 0":12,padding:"13px 16px",color:TEXT,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span>📊</span>
              <span style={{fontWeight:600,fontSize:13}}>Premium Schedule & Shortfall</span>
              {ins.julyShortfall>0&&<span style={{fontSize:10,color:RED,background:`${RED}18`,padding:"2px 7px",borderRadius:20,fontWeight:700}}>⚠ Shortfall</span>}
            </div>
            <span style={{color:MUTED}}>{showShortfall?"▲":"▼"}</span>
          </button>

          {showShortfall && (
            <div style={{background:CARD,border:`1px solid ${BLUE}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"16px"}}>
              <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Projected Balance</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
                {[
                  {label:"Now",value:funds.insurance.balance,color:BLUE},
                  {label:"By July",value:ins.projJuly,color:ins.projJuly>=ins.julyTotal?GREEN:RED},
                  {label:"By Oct",value:ins.projOct,color:ins.projOct>=ins.octTotal?GREEN:RED},
                ].map(({label,value,color})=>(
                  <div key={label} style={{background:BG,borderRadius:8,padding:"10px 12px",border:`1px solid ${BORDER}`}}>
                    <div style={{fontSize:10,color:MUTED,marginBottom:3}}>{label}</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color,fontSize:13}}>{fmt(value)}</div>
                  </div>
                ))}
              </div>

              {INSURANCE_MILESTONES.map(ms=>{
                const total=ms.items.reduce((s,i)=>s+i.amount,0);
                return (
                  <div key={ms.month} style={{marginBottom:14}}>

function YearSummary({bonuses}) {
  const totalCash     = bonuses.reduce((s,b)=>s+b.cashReceived, 0);
  const totalSetAside = bonuses.reduce((s,b)=>s+b.items.reduce((x,i)=>x+i.value,0), 0);
  const totalInvest   = Math.max(totalCash - totalSetAside, 0);

  // Aggregate set-aside items by category across all bonuses
  const catMap = {};
  bonuses.forEach(b => b.items.forEach(item => {
    const key = item.category||"Other";
    if (!catMap[key]) catMap[key] = {total:0, color:item.color};
    catMap[key].total += item.value;
  }));
  const cats = Object.entries(catMap).sort((a,b)=>b[1].total-a[1].total);

  // SVG donut chart
  const DonutChart = () => {
    if (totalCash <= 0) return null;
    const cx=100, cy=100, r=72, stroke=28;
    const circumference = 2 * Math.PI * r;
    const segments = [
      ...cats.map(([label,{total,color}])=>({label, value:total, color})),
      {label:"Investment", value:totalInvest, color:GREEN},
    ].filter(s=>s.value>0);
    let offset = 0;
    const gap = 1.5; // degrees gap between segments
    return (
      <svg viewBox="0 0 200 200" style={{width:180,height:180,display:"block",margin:"0 auto"}}>
        {segments.map((seg,i)=>{
          const pct = seg.value / totalCash;

          offset += pct;
          return (
            <circle key={i} cx={cx} cy={cy} r={r}
              fill="none" stroke={seg.color} strokeWidth={stroke}
              strokeDasharray={`${dashLen} ${circumference - dashLen}`}

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const FLEX_CATS = [
  {id:"food",     label:"Food & Groceries",                      icon:"🍜"},
  {id:"beauty",   label:"Beauty",                                icon:"💅"},
  {id:"shopping", label:"Shopping",                              icon:"🛍️"},
  {id:"home_ent", label:"Home, Entertainment, Sports, Personal", icon:"🎮"},
  {id:"cab",      label:"Cab",                                   icon:"🚕"},
  {id:"gifts",    label:"Gifts",                                 icon:"🎁"},
];

// Built-in defaults — flex is derived automatically
const DEFAULT_BUDGET = (m) => ({
  income:    11420,
  rent:      1807.28,
  tax:       m <= 3 ? 1354 : 1410,
  insurance: 540,
  nonneg:    571.12,
  gym:       463,
  travel:    800,
  savings:   3600,
  extra:     0,
  interest:  0,
});
const calcFlex = (b) => Math.round((b.income + b.extra + (b.interest||0) - b.rent - b.tax - b.insurance - b.nonneg - b.gym - b.travel - b.savings) * 100) / 100;

// Carry-forward: find effective budget for a month by applying all overrides
// from month 0 up to monthIdx in order (later overrides win)
const getEffectiveBudget = (overrides, monthIdx) => {
  const base = DEFAULT_BUDGET(monthIdx);
  for (let m = 0; m <= monthIdx; m++) {
    if (overrides[m]) Object.assign(base, overrides[m]);
  }
  return base;
};

function InterestTracker({monthIdx, spending, setSpending, setBudgetVal}) {
  const spendData  = spending[monthIdx] || {};
  const [expr, setExpr] = useState(spendData.interest_expr || "");
  const [total, setTotal] = useState(parseFloat(spendData.interest_total)||0);

  const evaluate = (raw) => {
    setExpr(raw);
    try {
      // Allow only digits, spaces, + - * / . ( )
      const safe = raw.replace(/[^0-9+\-*\/.()\s]/g,"");
      // eslint-disable-next-line no-new-func
      const result = safe.trim() ? Math.max(0, parseFloat(Function('"use strict";return ('+safe+')')()) || 0) : 0;
      const rounded = Math.round(result*100)/100;
      setTotal(rounded);
      setBudgetVal("interest", rounded);
      setSpending(prev=>({...prev,[monthIdx]:{...(prev[monthIdx]||{}),interest_expr:raw,interest_total:rounded}}));
    } catch {}
  };

  return (
    <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,padding:"13px 16px",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
        <span style={{fontSize:15}}>🏦</span>
        <span style={{fontSize:13,fontWeight:600,color:GREEN}}>Bank Interest</span>
        <span style={{fontSize:10,color:MUTED,marginLeft:2}}>e.g. 12.50 + 8.30 + 44</span>
      </div>
      <textarea
        value={expr}
        onChange={e=>evaluate(e.target.value)}
        placeholder="12.50 + 8.30 + 44"
        rows={3}
        style={{width:"100%",background:"#0A0D14",border:`1px solid ${BORDER}`,borderRadius:8,
          color:TEXT,fontSize:14,padding:"9px 11px",fontFamily:"'DM Mono',monospace",outline:"none",
          resize:"none",lineHeight:1.6,boxSizing:"border-box",display:"block"}}
      />
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:GREEN,
        textAlign:"right",marginTop:8}}>
        = {fmt(total).replace("SGD ","")}
      </div>
    </div>
  );
}

  const [monthIdx,  setMonthIdx]  = useState(new Date().getMonth());

    try { const s = lsGet("budget-overrides"); return s ? JSON.parse(s) : {}; } catch { return {}; }
  });

    try { const s = lsGet("monthly-tracker"); return s ? JSON.parse(s) : initSpending(); } catch { return initSpending(); }
  });

  useEffect(() => { try { lsSet("budget-overrides", JSON.stringify(overrides)); } catch {} }, [overrides]);
  useEffect(() => { try { lsSet("monthly-tracker",  JSON.stringify(spending));  } catch {} }, [spending]);

            <div>
              <div style={{fontSize:11,color:"#7A8099",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Flexible Spending</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:700,color:totalSpent>flexBudget?"#E85454":"#E8EAF0"}}>{fmt(totalSpent)}</div>
              <div style={{fontSize:12,color:"#7A8099",marginTop:3}}>of <span style={{fontFamily:"'DM Mono',monospace",color:"#E8EAF0"}}>{fmt(flexBudget)}</span> budget</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"#7A8099",marginBottom:3}}>Remaining</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:totalLeft>=0?"#5BC8A0":"#E85454"}}>
                {totalLeft>=0?fmt(totalLeft):`−${fmt(Math.abs(totalLeft))}`}
              </div>
            </div>
          </div>
          <div style={{height:8,borderRadius:4,background:"#252A3A",overflow:"hidden"}}>
            <div style={{width:`${pctUsed}%`,height:"100%",borderRadius:4,transition:"width 0.4s ease",
              background:totalSpent>flexBudget?"#E85454":pctUsed>85?"#F4845F":"#5BC8A0"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:"#7A8099"}}>
            <span>SGD 0</span><span>{Math.round(pctUsed)||0}% used</span><span>{fmt(flexBudget)}</span>
          </div>
        </div>

        {/* Remarks */}
        <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
          <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>📝 Remarks</div>
          <textarea
            value={spendData.remarks||""}
            onChange={e=>setSpendVal("remarks", e.target.value)}
            placeholder={`Any notes for ${MONTHS[monthIdx]}…`}
            style={{width:"100%",background:"#0A0D14",border:`1px solid ${BORDER}`,borderRadius:8,
              color:TEXT,fontSize:13,padding:"10px 12px",fontFamily:"inherit",outline:"none",
              resize:"none",lineHeight:1.7,boxSizing:"border-box",display:"block",
              minHeight:80, whiteSpace:"pre-wrap", overflowWrap:"break-word"}}
            onInput={e=>{e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";}}
          />
        </div>

        {/* Spending rows */}
        <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,overflow:"hidden",marginBottom:12}}>
          <div style={{padding:"10px 16px",borderBottom:"1px solid #252A3A",fontSize:10,color:"#7A8099",textTransform:"uppercase",letterSpacing:"0.08em",display:"flex",justifyContent:"space-between"}}>
            <span>Category</span><span>Spent this month</span>
          </div>
          {FLEX_CATS.map((cat,i)=>{
            const spent = parseFloat(spendData[cat.id])||0;
            const sharePct = totalSpent>0?Math.round((spent/totalSpent)*100):0;
            return (
              <div key={cat.id} style={{padding:"12px 16px",borderBottom:i<FLEX_CATS.length-1?"1px solid #252A3A":"none",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16,flexShrink:0}}>{cat.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>{cat.label}</div>
                  <div style={{height:4,borderRadius:2,background:"#252A3A",overflow:"hidden"}}>
                    <div style={{width:`${sharePct}%`,height:"100%",background:"#E8C547",borderRadius:2,transition:"width 0.3s ease"}}/>
                  </div>
                  {spent>0&&<div style={{fontSize:10,color:"#7A8099",marginTop:3}}>{sharePct}% of flex spending</div>}
                </div>
                {inp(spendData[cat.id]||"", v=>setSpendVal(cat.id,v))}
              </div>
            );
          })}
          <div style={{padding:"12px 16px",background:"#13161F",display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"2px solid #252A3A"}}>
            <span style={{fontSize:13,fontWeight:700}}>Total Spent</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:totalSpent>flexBudget?"#E85454":"#E8EAF0"}}>{fmt(totalSpent)}</span>
          </div>
        </div>

        {/* Spending pie chart */}
        {(()=>{
          const fixedRows = [
            {id:"rent",      label:"Rent",              icon:"🏠", color:"#A78BD4", budgeted:budget.rent},
            {id:"tax",       label:"Income Tax",        icon:"📋", color:"#E8547A", budgeted:budget.tax},
            {id:"insurance", label:"Insurance",         icon:"🛡️", color:"#5B8DB8", budgeted:budget.insurance},
            {id:"nonneg",    label:"Non-negotiables",   icon:"📌", color:"#5BC8A0", budgeted:budget.nonneg},
            {id:"gym",       label:"Gym",               icon:"🏋️", color:"#E8C547", budgeted:budget.gym},
            {id:"travel",    label:"Travel Fund",       icon:"✈️", color:"#E07B4F", budgeted:budget.travel},
            {id:"savings",   label:"Savings & Invest.", icon:"📈", color:"#7EC8C8", budgeted:budget.savings},
          ];
          const flexActual = FLEX_CATS.reduce((s,c)=>s+(parseFloat(spendData[c.id])||0),0);
          const flexPieVal = flexActual>0 ? flexActual : flexBudget;
          const flexIsActual = flexActual>0;
          const allCats = [
            ...fixedRows.map(row => {
              const actual = spendData[`${row.id}_actual`];
              const hasActual = actual !== "" && actual !== undefined && !isNaN(parseFloat(actual));
              return {...row, value: hasActual ? parseFloat(actual) : row.budgeted, isActual: hasActual};
            }),
            {id:"flex", label:"Flexible Spending", icon:"🛍️", color:PALETTE[4], value:flexPieVal, isActual:flexIsActual, isFlex:true},
          ].filter(c=>c.value>0);
          const grandTotal = allCats.reduce((s,c)=>s+c.value, 0);
          if (grandTotal===0) return null;
          const cx=100, cy=100, r=72, stroke=32, circ=2*Math.PI*r;
          let offset=0;
          return (
            <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:11,color:"#7A8099",textTransform:"uppercase",letterSpacing:"0.08em"}}>Monthly Breakdown</div>
                <div style={{fontSize:10,color:"#7A8099"}}>◉ actual &nbsp;○ budgeted</div>
              </div>
              <svg viewBox="0 0 200 200" style={{width:180,height:180,display:"block",margin:"0 auto"}}>
                {allCats.map(cat=>{
                  const pct = cat.value/grandTotal;
                  const dash = Math.max(pct*circ - 1.5, 0);
                  const off = -offset*circ;
                  offset += pct;
                  return <circle key={cat.id} cx={cx} cy={cy} r={r} fill="none" stroke={cat.color}
                    strokeWidth={stroke} strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={off}
                    opacity={cat.isActual ? 1 : 0.45}
                    style={{transform:"rotate(-90deg)",transformOrigin:"100px 100px",transition:"stroke-dasharray 0.4s ease"}}/>;
                })}
                <text x={cx} y={cy-8} textAnchor="middle" fill="#7A8099" fontSize="10" fontFamily="DM Sans">Total</text>
                <text x={cx} y={cy+8} textAnchor="middle" fill="#E8EAF0" fontSize="12" fontWeight="700" fontFamily="DM Mono">{fmt(grandTotal).replace("SGD ","")}</text>
                <text x={cx} y={cy+22} textAnchor="middle" fill="#7A8099" fontSize="10" fontFamily="DM Sans">SGD</text>
              </svg>
              <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:7}}>
                {allCats.map(cat=>(
                  <div key={cat.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",opacity:cat.isActual?1:0.6}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:cat.color,flexShrink:0,opacity:cat.isActual?1:0.5}}/>
                      <span style={{fontSize:12,color:"#E8EAF0"}}>{cat.icon} {cat.label}</span>
                      {!cat.isActual&&<span style={{fontSize:10,color:"#7A8099"}}>(budgeted)</span>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,marginLeft:8}}>
                      <span style={{fontSize:11,color:"#7A8099"}}>{Math.round((cat.value/grandTotal)*100)}%</span>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600}}>{fmt(cat.value)}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

        {/* Full month snapshot */}
        <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,padding:"14px 16px",marginBottom:8}}>
          <div style={{fontSize:11,color:"#7A8099",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>Full Month Snapshot</div>
          {[
            {label:"Income",           value:budget.income,    color:"#5BC8A0"},
            ...(budget.extra>0?[{label:"🎉 Extra Income", value:budget.extra, color:"#5BC8A0"}]:[]),
            ...(budget.interest>0?[{label:"🏦 Bank Interest", value:budget.interest, color:"#5BC8A0"}]:[]),
            {label:"Rent",             value:budget.rent,      color:"#A78BD4"},
            {label:"Income Tax",       value:budget.tax,       color:"#E8547A"},
            {label:"Insurance",        value:budget.insurance, color:"#5B8DB8"},
            {label:"Non-negotiables",  value:budget.nonneg,    color:"#5BC8A0"},
            {label:"Gym",              value:budget.gym,       color:"#E8C547"},
            {label:"Flexible Spending",value:flexBudget, actual:anySpend?totalSpent:null, color:"#F4845F"},
            {label:"Travel Fund",      value:budget.travel,    color:"#F4845F"},
            {label:"Savings & Invest.",value:budget.savings,   color:"#5B8DB8"},
          ].map(({label,value,actual,color})=>(
            <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flex:1,minWidth:0}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:color,flexShrink:0}}/>
                <span style={{fontSize:12,color:"#7A8099"}}>{label}</span>
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                {actual!=null?(
                  <span>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:actual>value?"#E85454":"#5BC8A0"}}>{fmt(actual)}</span>
                    <span style={{fontSize:10,color:"#7A8099"}}> / {fmt(value)}</span>
                  </span>
                ):(
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:(label==="Income"||label.includes("Extra Income")||label.includes("Bank Interest"))?"#5BC8A0":"#E8EAF0"}}>{fmt(value)}</span>
                )}
              </div>
            </div>
          ))}
          <div style={{borderTop:"1px solid #252A3A",marginTop:6,paddingTop:10,display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,fontWeight:700}}>Total Income</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,color:"#5BC8A0"}}>{fmt(budget.income+(budget.extra||0)+(budget.interest||0))}</span>
          </div>
        </div>

      </>}

      {/* ── BUDGET TAB ── */}
      {activeTab==="budget" && <>
        <div style={{background:"#E8C54712",border:"1px solid #E8C54733",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#7A8099",lineHeight:1.6}}>
          ⚙️ Changes from <strong style={{color:"#E8EAF0"}}>{MONTHS[monthIdx]}</strong> carry forward to all later months automatically. Flexible spending adjusts to keep the budget balanced.
        </div>

        <InterestTracker monthIdx={monthIdx} spending={spending} setSpending={setSpending} setBudgetVal={setBudgetVal} />

        <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,overflow:"hidden",marginBottom:12}}>
          {BUDGET_ROWS.filter(row=>row.id!=="interest").map((row,i,arr)=>(
            <div key={row.id} style={{
              padding:"13px 16px",
              borderBottom:i<arr.length-1?"1px solid #252A3A":"none",
              background:row.isIncome?"#0D1A140A":"none",
              display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,
            }}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:row.hint?3:0}}>
                  <span style={{fontSize:15}}>{row.icon}</span>
                  <span style={{fontSize:13,fontWeight:600,color:row.color}}>{row.label}</span>
                </div>
                {row.hint&&<div style={{fontSize:10,color:"#7A8099",paddingLeft:22}}>{row.hint}</div>}
              </div>
              {inp(budget[row.id]||"", v=>setBudgetVal(row.id, v), row.isIncome?"#5BC8A0":undefined)}
            </div>
          ))}
        </div>

        {/* Derived flex result */}
        <div style={{
          background:flexBudget<0?"#1F0D10":"#0D1F18",
          border:`1px solid ${flexBudget<0?"#E8545444":"#5BC8A044"}`,
          borderRadius:12,padding:"14px 16px",marginBottom:12,
          display:"flex",justifyContent:"space-between",alignItems:"center",
        }}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:flexBudget<0?"#E85454":"#5BC8A0"}}>🛍️ Flexible Spending Budget</div>
            <div style={{fontSize:11,color:"#7A8099",marginTop:3}}>Auto-calculated · Income minus all expenses</div>
            {flexBudget<0&&<div style={{fontSize:11,color:"#E85454",marginTop:4}}>⚠ Over by {fmt(Math.abs(flexBudget))} — reduce an expense above</div>}
          </div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:flexBudget<0?"#E85454":"#5BC8A0",flexShrink:0,marginLeft:12}}>{fmt(flexBudget)}</div>
        </div>

        {/* Fixed actuals */}
        <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,overflow:"hidden",marginBottom:12}}>
          <div style={{padding:"10px 16px",borderBottom:"1px solid #252A3A",fontSize:10,color:"#7A8099",textTransform:"uppercase",letterSpacing:"0.08em"}}>
            Fixed Expense Actuals — for pie chart
          </div>
          <div style={{padding:"8px 16px",borderBottom:"1px solid #252A3A",fontSize:11,color:"#7A8099",lineHeight:1.5}}>
            Enter what you actually spent. Leave blank to use the budgeted amount in the chart.
          </div>
          {[
            {id:"rent",      label:"Rent",              icon:"🏠", color:"#A78BD4", budgeted:budget.rent},
            {id:"tax",       label:"Income Tax",        icon:"📋", color:"#E8547A", budgeted:budget.tax},
            {id:"insurance", label:"Insurance",         icon:"🛡️", color:"#5B8DB8", budgeted:budget.insurance},
            {id:"nonneg",    label:"Non-negotiables",   icon:"📌", color:"#5BC8A0", budgeted:budget.nonneg},
            {id:"gym",       label:"Gym",               icon:"🏋️", color:"#E8C547", budgeted:budget.gym},
            {id:"travel",    label:"Travel Fund",       icon:"✈️", color:"#F4845F", budgeted:budget.travel},
            {id:"savings",   label:"Savings & Invest.", icon:"📈", color:"#5B8DB8", budgeted:budget.savings},
          ].map((row,i,arr)=>{
            const rawActual = spendData[`${row.id}_actual`];
            const hasActual = rawActual !== "" && rawActual !== undefined && !isNaN(parseFloat(rawActual));
            const actual = hasActual ? parseFloat(rawActual) : null;
            const diff = hasActual ? actual - row.budgeted : 0;
            return (
              <div key={row.id} style={{padding:"11px 16px",borderBottom:i<arr.length-1?"1px solid #252A3A":"none",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:3,height:36,borderRadius:2,background:row.color,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500}}>{row.icon} {row.label}</div>
                  <div style={{fontSize:10,color:"#7A8099",marginTop:2}}>
                    Budgeted: <span style={{fontFamily:"'DM Mono',monospace",color:"#E8EAF0"}}>{fmt(row.budgeted)}</span>
                    {hasActual && diff!==0 && <span style={{marginLeft:6,color:diff>0?"#E85454":"#5BC8A0"}}>{diff>0?"↑":"↓"} {fmt(Math.abs(diff)).replace("SGD ","")}</span>}
                  </div>
                </div>
                <input type="number" inputMode="decimal"
                  placeholder={fmt(row.budgeted).replace("SGD ","")}
                  value={rawActual||""}
                  onChange={e=>setSpendVal(`${row.id}_actual`, e.target.value)}
                  style={{background:"#0A0D14",border:`1px solid #252A3A`,borderRadius:8,
                    color:hasActual&&diff>0?"#E85454":hasActual&&diff<0?"#5BC8A0":"#E8EAF0",
                    fontSize:14,fontFamily:"'DM Mono',monospace",padding:"8px 10px",width:128,textAlign:"right",outline:"none",flexShrink:0}}
                />
              </div>
            );
          })}
        </div>

        {/* Reset this month */}
        {isModified&&(
          <button onClick={()=>{
            if(window.confirm(`Reset ${MONTHS[monthIdx]}'s budget to default?\n\nThis only affects ${MONTHS[monthIdx]} — earlier months and later months that inherited from here will re-compute from the previous override or default.`)){
              setOverrides(prev=>{const n={...prev};delete n[monthIdx];return n;});
            }
          }} style={{width:"100%",background:"none",border:"1px solid #252A3A",borderRadius:8,padding:"10px",color:"#7A8099",fontSize:12,cursor:"pointer",fontFamily:"inherit",marginBottom:8}}>
            ↩ Reset {MONTHS[monthIdx]} to inherited default
          </button>
        )}
      </>}

    </div>
  );
}


// ─── APP SHELL ───────────────────────────────────────────────────────────────
const TABS = [
  {id:"monthly", label:"Monthly",      icon:"📅"},
  {id:"sinking", label:"Sinking Funds",icon:"🪣"},
  {id:"bonus",   label:"Bonus",        icon:"💰"},
  {id:"settings",label:"Backup",       icon:"💾"},
];

function BackupRestore() {
  const [imported, setImported] = useState(false);
  const [error, setError] = useState("");
  const [syncStatus, setSyncStatusLocal] = useState(getSyncStatus());

  useEffect(() => {
    const unsub = onSyncStatus(s => setSyncStatusLocal(s));
    return unsub;
  }, []);

  const exportData = () => {
    const data = {
      version: "1.7.0",
      exported: new Date().toISOString(),
      "monthly-tracker":    lsGet("monthly-tracker"),
      "budget-overrides":   lsGet("budget-overrides"),
      "sf-funds":           lsGet("sf-funds"),
      "bonus-allocation-v2":lsGet("bonus-allocation-v2"),
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    const date = new Date().toISOString().split("T")[0];
    a.href = url; a.download = `finance-backup-${date}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    setError("");
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data["monthly-tracker"])     lsSet("monthly-tracker",     data["monthly-tracker"]);
        if (data["budget-overrides"])    lsSet("budget-overrides",    data["budget-overrides"]);
        if (data["sf-funds"])            lsSet("sf-funds",            data["sf-funds"]);
        if (data["bonus-allocation-v2"]) lsSet("bonus-allocation-v2", data["bonus-allocation-v2"]);
        setImported(true);
        setTimeout(() => window.location.reload(), 1200);
      } catch {
        setError("Invalid backup file. Please use a file exported from this app.");
      }
    };
    reader.readAsText(file);
  };

  const syncColor = syncStatus==="ok"?GREEN : syncStatus==="error"?RED : syncStatus==="syncing"?BLUE : MUTED;
  const syncLabel = syncStatus==="ok"?"✓ Synced to cloud" : syncStatus==="error"?"⚠ Sync failed (data saved locally)" : syncStatus==="syncing"?"↑ Syncing…" : supabase?"☁ Cloud sync active":"⚠ Not connected — edit SUPABASE_URL & KEY";

  return (
    <div style={{padding:"16px"}}>
      <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:16}}>Data Backup & Restore</div>

      {/* Sync status */}
      <div style={{background:CARD,border:`1px solid ${syncColor}44`,borderRadius:12,padding:"14px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:syncColor,flexShrink:0}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,color:syncColor}}>{syncLabel}</div>
          {supabase && <div style={{fontSize:11,color:MUTED,marginTop:2}}>Your data syncs automatically across all devices when online.</div>}
          {!supabase && <div style={{fontSize:11,color:MUTED,marginTop:2}}>See setup instructions at the bottom of this screen.</div>}
        </div>
      </div>

      {/* Export */}
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"18px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>📤</span>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>Export Backup</div>
            <div style={{fontSize:12,color:MUTED,marginTop:2}}>Save all your data as a file on your device</div>
          </div>
        </div>
        <button onClick={exportData} style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:GREEN,color:"#0F1117",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>
          📥 Download Backup File
        </button>
      </div>

      {/* Import */}
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"18px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>📥</span>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>Restore from Backup</div>
            <div style={{fontSize:12,color:MUTED,marginTop:2}}>Load a previously exported backup file</div>
          </div>
        </div>
        {imported ? (
          <div style={{padding:"12px",borderRadius:10,background:`${GREEN}18`,border:`1px solid ${GREEN}44`,color:GREEN,fontSize:13,fontWeight:600,textAlign:"center"}}>
            ✓ Data restored! Reloading...
          </div>
        ) : (
          <label style={{display:"block",width:"100%",padding:"14px",borderRadius:10,border:`2px dashed ${BORDER}`,color:MUTED,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit",textAlign:"center",boxSizing:"border-box"}}>
            📂 Choose Backup File
            <input type="file" accept=".json" onChange={importData} style={{display:"none"}} />
          </label>
        )}
        {error && <div style={{marginTop:10,padding:"10px 12px",borderRadius:8,background:`${RED}15`,color:RED,fontSize:12}}>{error}</div>}
      </div>

      {/* Setup instructions (only shown if not configured) */}
      {!supabase && (
        <div style={{background:CARD,border:`1px solid ${YELLOW}44`,borderRadius:12,padding:"16px"}}>
          <div style={{fontSize:12,color:YELLOW,fontWeight:700,marginBottom:10}}>☁️ Enable Cloud Sync — Supabase Setup</div>
          {[
            "Go to supabase.com and open your project",
            "Run this SQL in the SQL Editor:\n\nCREATE TABLE finance_data (\n  user_id TEXT PRIMARY KEY,\n  payload JSONB,\n  updated_at TIMESTAMPTZ\n);",
            "Go to Project Settings → API",
            "Copy your Project URL and anon/public key",
            'Open index.html and paste them into:\n\nconst SUPABASE_URL = "..."\nconst SUPABASE_ANON_KEY = "..."',
            "Save and push to GitHub — done!",
          ].map((step, i) => (
            <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
              <div style={{width:20,height:20,borderRadius:"50%",background:`${YELLOW}22`,border:`1px solid ${YELLOW}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:YELLOW,flexShrink:0,marginTop:1}}>{i+1}</div>
              <div style={{fontSize:12,color:MUTED,lineHeight:1.6,whiteSpace:"pre-wrap",fontFamily:step.includes("CREATE")||step.includes("const ")?"'DM Mono',monospace":"inherit"}}>{step}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("monthly");
  const [isDark, setIsDark] = useState(() => {
    try { return lsGet("theme") !== "light"; } catch { return true; }
  });
  const [hydrated, setHydrated] = useState(false);

  useEffect(() => {
    hydrateFromCloud().then(didSync => {
      setHydrated(true);
      if (didSync) {
        // Re-read theme from cloud-hydrated localStorage
        setIsDark(lsGet("theme") !== "light");
      }
    });
  }, []);
  applyTheme(isDark ? DARK : LIGHT);

  const toggleTheme = () => {
    const next = !isDark;
    setIsDark(next);
    try { lsSet("theme", next ? "dark" : "light"); } catch {}
  };

  return (
    <div style={{minHeight:"100vh",background:BG,color:TEXT,paddingBottom:80}}>
      {/* Top bar */}
      <div style={{position:"sticky",top:0,zIndex:50,background:CARD,borderBottom:`1px solid ${BORDER}`,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:10,color:MUTED,letterSpacing:"0.1em",textTransform:"uppercase"}}>Personal Finance</div>
          <div style={{fontSize:17,fontWeight:700,letterSpacing:"-0.01em"}}>{TABS.find(t=>t.id===tab)?.icon} {TABS.find(t=>t.id===tab)?.label}</div>
        </div>
        <button onClick={toggleTheme} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:20,padding:"5px 12px",cursor:"pointer",fontSize:13,color:MUTED,fontFamily:"inherit"}}>
          {isDark ? "☀️" : "🌙"}
        </button>
      </div>

      {tab==="monthly"  && <MonthlyTracker />}
      {tab==="sinking"  && <SinkingFunds />}
      {tab==="bonus"    && <BonusAllocation />}
      {tab==="settings" && <BackupRestore />}

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:CARD,borderTop:`1px solid ${BORDER}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {TABS.map(t=>{
          const active = tab===t.id;
          return (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 8px 10px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,borderTop:`2px solid ${active?YELLOW:"transparent"}`}}>
              <span style={{fontSize:20}}>{t.icon}</span>
              <span style={{fontSize:10,fontWeight:600,color:active?YELLOW:MUTED,letterSpacing:"0.04em"}}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
// ─── AUTO-UPDATING SERVICE WORKER ────────────────────────────────────────────
// Bump this version number every time the file is updated.
// The app will detect the change and refresh automatically in the background.
const APP_VERSION = "1.7.3";

if ('serviceWorker' in navigator) {
  // Inline the service worker as a blob so we don't need a separate sw.js file
  const swCode = `
    const VERSION = "${APP_VERSION}";
    const CACHE = "finance-tracker-" + VERSION;

    self.addEventListener("install", e => {
      // Take over immediately without waiting
      self.skipWaiting();
    });

    self.addEventListener("activate", e => {
      // Delete all old caches that don't match current version
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(
            keys.filter(k => k !== CACHE).map(k => caches.delete(k))
          )
        ).then(() => self.clients.claim())
      );
    });

    self.addEventListener("fetch", e => {
      // Always go to network first, fall back to cache
      // This ensures updates are picked up immediately
      e.respondWith(
        fetch(e.request)
          .then(res => {
            // Cache a copy of the response
            const clone = res.clone();
            caches.open(CACHE).then(cache => cache.put(e.request, clone));
            return res;
          })
          .catch(() => caches.match(e.request))
      );
    });

    // Tell all open tabs to reload when a new version activates
    self.addEventListener("message", e => {
      if (e.data === "skipWaiting") self.skipWaiting();
    });
  `;

  const blob = new Blob([swCode], {type: "application/javascript"});
  const swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl).then(reg => {
    // When a new service worker is waiting, reload the page to apply it
    reg.addEventListener("updatefound", () => {
      const newWorker = reg.installing;
      newWorker.addEventListener("statechange", () => {
        if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
          // New version available — reload silently to apply update
          newWorker.postMessage("skipWaiting");
          window.location.reload();
        }
      });
    });

    // Check for updates every time the app is opened or comes to foreground
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") reg.update();
    });
  }).catch(err => console.log("SW registration failed:", err));
}
</script>
