
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0F1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <title>Finance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #0F1117; font-family: 'DM Sans', 'Segoe UI', sans-serif; color: #E8EAF0; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #252A3A; border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ─── THEME ───────────────────────────────────────────────────────────────────
const BG="#0F1117",CARD="#181C27",BORDER="#252A3A",TEXT="#E8EAF0",MUTED="#7A8099";
const GREEN="#5BC8A0",YELLOW="#E8C547",RED="#E8547A",BLUE="#5B8DB8",PURPLE="#A78BD4",ORANGE="#E07B4F";
const PALETTE=["#A78BD4","#5BC8A0","#F4845F","#E8C547","#5B8DB8","#E07B4F","#E8547A","#7EC8C8","#F0A500","#B0C4DE"];

const fmt = n => "SGD " + Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => new Date(d).toLocaleDateString("en-SG",{day:"2-digit",month:"short",year:"numeric"});
const today = () => new Date().toISOString().split("T")[0];
const inp = (extra={}) => ({background:"#0A0D14",border:`1px solid ${BORDER}`,borderRadius:8,color:TEXT,fontSize:16,padding:"12px 14px",fontFamily:"inherit",outline:"none",boxSizing:"border-box",width:"100%",...extra});

// ─── SINKING FUNDS ───────────────────────────────────────────────────────────
const INSURANCE_MILESTONES = [
  { month:"July 2026", date:"2026-07-01", color:RED, items:[
    {label:"GE Whole Life",amount:1892.40},{label:"GE Hospitalisation",amount:401.00},
    {label:"Singlife ECI",amount:1452.00},{label:"Singlife Comprehensive CI",amount:1522.50},
    {label:"Careshield Life Cash",amount:391.78},{label:"CPF MA Top-up (Careshield)",amount:600.00},
  ]},
  { month:"October 2026", date:"2026-10-01", color:ORANGE, items:[
    {label:"Singlife Term",amount:584.75},{label:"CPF MA Top-up (Careshield)",amount:838.28},
  ]},
];

const FUND_META = [
  {id:"travel",   name:"Travel",           icon:"✈",  color:YELLOW,  monthlyAdd:800 },
  {id:"insurance",name:"Insurance",         icon:"🛡", color:BLUE,    monthlyAdd:540 },
  {id:"home",     name:"4TP Maintenance",   icon:"🔧", color:GREEN,   monthlyAdd:165 },
  {id:"newhome",  name:"New Home",          icon:"🏠", color:PURPLE,  monthlyAdd:1200},
];

const DEFAULT_BALANCES = {travel:431.51, insurance:1327.55, home:347.69, newhome:235415};

const initFunds = () => FUND_META.reduce((acc,f) => ({
  ...acc,
  [f.id]: { balance:DEFAULT_BALANCES[f.id], txns:[{id:1,type:"opening",note:"Opening balance",amount:0,date:today(),balance:DEFAULT_BALANCES[f.id]}] }
}), {});

function projectedBalance(currentBalance, monthlyAdd, targetMonthIndex) {
  const cur = new Date().getMonth();
  return currentBalance + monthlyAdd * Math.max(0, targetMonthIndex - cur);
}

function SinkingFunds() {
  const [funds, setFunds] = useState(() => { try { const s=localStorage.getItem("sf-funds"); return s?JSON.parse(s):initFunds(); } catch{ return initFunds(); }});
  const [activeId, setActiveId] = useState("travel");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({amount:"",note:"",date:today()});
  const [formError, setFormError] = useState("");
  const [showShortfall, setShowShortfall] = useState(false);
  const [showTxns, setShowTxns] = useState(true);

  useEffect(() => { try{ localStorage.setItem("sf-funds", JSON.stringify(funds)); }catch{} }, [funds]);

  const activeFund = FUND_META.find(f=>f.id===activeId);
  const activeData = funds[activeId];
  const totalBalance = FUND_META.reduce((s,f)=>s+funds[f.id].balance, 0);

  const ins = useMemo(() => {
    const bal = funds.insurance.balance, mo = 540;
    const projJuly = projectedBalance(bal, mo, 6);
    const julyTotal = INSURANCE_MILESTONES[0].items.reduce((s,i)=>s+i.amount,0);
    const julyShortfall = julyTotal - projJuly;
    const afterJuly = Math.max(0, projJuly - julyTotal);
    const projOct = afterJuly + mo*3;
    const octTotal = INSURANCE_MILESTONES[1].items.reduce((s,i)=>s+i.amount,0);
    const octShortfall = octTotal - projOct;
    const extraMonthly = julyShortfall>0 ? Math.ceil(julyShortfall/4) : 0;
    return {projJuly,julyTotal,julyShortfall,projOct,octTotal,octShortfall,extraMonthly};
  }, [funds.insurance.balance]);

  const openModal = type => { setForm({amount:"",note:"",date:today()}); setFormError(""); setModal({type,fundId:activeId}); };
  const closeModal = () => { setModal(null); setFormError(""); };

  const submitTxn = () => {
    const amt = parseFloat(form.amount);
    if (!form.amount||isNaN(amt)||amt<=0){ setFormError("Enter a valid amount."); return; }
    if (modal.type==="withdraw"&&amt>funds[modal.fundId].balance){ setFormError(`Max: ${fmt(funds[modal.fundId].balance)}`); return; }
    const isDeposit = modal.type==="deposit";
    setFunds(prev => {
      const fund = prev[modal.fundId];
      const newBal = isDeposit ? fund.balance+amt : fund.balance-amt;
      const txn = {id:Date.now(),type:modal.type,amount:isDeposit?amt:-amt,note:form.note.trim()||(isDeposit?"Deposit":"Withdrawal"),date:form.date,balance:newBal};
      return {...prev,[modal.fundId]:{balance:newBal,txns:[txn,...fund.txns]}};
    });
    closeModal();
  };

  return (
    <div style={{padding:"16px 16px 8px"}}>
      {/* Total */}
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em"}}>Total Across All Funds</div>
        <div style={{fontSize:28,fontWeight:700,fontFamily:"'DM Mono',monospace",color:GREEN,marginTop:2}}>{fmt(totalBalance)}</div>
      </div>

      {/* Fund cards grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {FUND_META.map(f => {
          const isActive = f.id===activeId;
          const hasAlert = f.id==="insurance"&&ins.julyShortfall>0;
          return (
            <div key={f.id} onClick={()=>setActiveId(f.id)} style={{background:isActive?`${f.color}18`:CARD,border:`1px solid ${isActive?f.color:BORDER}`,borderTop:`3px solid ${f.color}`,borderRadius:12,padding:"14px 12px",cursor:"pointer",position:"relative"}}>
              {hasAlert && <div style={{position:"absolute",top:8,right:8,width:7,height:7,borderRadius:"50%",background:RED}}/>}
              <div style={{fontSize:22,marginBottom:6}}>{f.icon}</div>
              <div style={{fontSize:10,color:MUTED,marginBottom:2}}>{f.name}</div>
              <div style={{fontSize:15,fontWeight:700,fontFamily:"'DM Mono',monospace",color:f.color}}>{fmt(funds[f.id].balance)}</div>
              <div style={{fontSize:10,color:f.color,marginTop:4,opacity:0.8}}>+{fmt(f.monthlyAdd).replace("SGD ","")}/mo</div>
            </div>
          );
        })}
      </div>

      {/* Active fund */}
      <div style={{background:CARD,border:`1px solid ${activeFund.color}44`,borderRadius:12,overflow:"hidden",marginBottom:12}}>
        <div style={{padding:"14px 16px",background:`${activeFund.color}0C`,borderBottom:`1px solid ${BORDER}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:700,fontSize:15}}>{activeFund.icon} {activeFund.name}</div>
              <div style={{fontSize:12,color:MUTED,fontFamily:"'DM Mono',monospace",marginTop:2}}>
                Balance: <span style={{color:activeFund.color,fontWeight:700}}>{fmt(activeData.balance)}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>openModal("deposit")} style={{padding:"9px 14px",borderRadius:8,border:`1px solid ${GREEN}`,background:`${GREEN}20`,color:GREEN,fontWeight:700,fontSize:13,cursor:"pointer"}}>+ Add</button>
              <button onClick={()=>openModal("withdraw")} style={{padding:"9px 14px",borderRadius:8,border:`1px solid ${RED}`,background:`${RED}20`,color:RED,fontWeight:700,fontSize:13,cursor:"pointer"}}>− Use</button>
            </div>
          </div>
        </div>

        <button onClick={()=>setShowTxns(s=>!s)} style={{width:"100%",background:"none",border:"none",borderBottom:showTxns?`1px solid ${BORDER}`:"none",padding:"10px 16px",color:MUTED,fontSize:12,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between"}}>
          <span>Transaction History ({activeData.txns.length})</span>
          <span>{showTxns?"▲":"▼"}</span>
        </button>

        {showTxns && (
          <div style={{maxHeight:260,overflowY:"auto"}}>
            {activeData.txns.map((txn,i)=>{
              const isDeposit=txn.amount>=0, isOpening=txn.type==="opening";
              return (
                <div key={txn.id} style={{padding:"11px 16px",borderBottom:i<activeData.txns.length-1?`1px solid ${BORDER}`:"none",background:i%2===0?"transparent":"#13161F"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,color:isOpening?MUTED:TEXT,fontStyle:isOpening?"italic":"normal",marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{txn.note}</div>
                      <div style={{fontSize:11,color:MUTED}}>{fmtDate(txn.date)}</div>
                    </div>
                    <div style={{textAlign:"right",marginLeft:12,flexShrink:0}}>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:600,color:isOpening?MUTED:isDeposit?GREEN:RED}}>
                        {isOpening?"—":(isDeposit?"+":"−")+fmt(Math.abs(txn.amount)).replace("SGD ","")}
                      </div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:MUTED}}>{fmt(txn.balance)}</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Insurance shortfall */}
      {activeId==="insurance" && (
        <div style={{marginBottom:12}}>
          <button onClick={()=>setShowShortfall(s=>!s)} style={{width:"100%",background:CARD,border:`1px solid ${showShortfall?BLUE:BORDER}`,borderRadius:showShortfall?"12px 12px 0 0":12,padding:"13px 16px",color:TEXT,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span>📊</span>
              <span style={{fontWeight:600,fontSize:13}}>Premium Schedule & Shortfall</span>
              {ins.julyShortfall>0&&<span style={{fontSize:10,color:RED,background:`${RED}18`,padding:"2px 7px",borderRadius:20,fontWeight:700}}>⚠ Shortfall</span>}
            </div>
            <span style={{color:MUTED}}>{showShortfall?"▲":"▼"}</span>
          </button>

          {showShortfall && (
            <div style={{background:CARD,border:`1px solid ${BLUE}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"16px"}}>
              <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Projected Balance</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
                {[
                  {label:"Now",value:funds.insurance.balance,color:BLUE},
                  {label:"By July",value:ins.projJuly,color:ins.projJuly>=ins.julyTotal?GREEN:RED},
                  {label:"By Oct",value:ins.projOct,color:ins.projOct>=ins.octTotal?GREEN:RED},
                ].map(({label,value,color})=>(
                  <div key={label} style={{background:BG,borderRadius:8,padding:"10px 12px",border:`1px solid ${BORDER}`}}>
                    <div style={{fontSize:10,color:MUTED,marginBottom:3}}>{label}</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color,fontSize:13}}>{fmt(value)}</div>
                  </div>
                ))}
              </div>

              {INSURANCE_MILESTONES.map(ms=>{
                const total=ms.items.reduce((s,i)=>s+i.amount,0);
                return (
                  <div key={ms.month} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:ms.color}}/>
                        <span style={{fontWeight:700,fontSize:13,color:ms.color}}>{ms.month}</span>
                      </div>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:ms.color,fontWeight:700}}>{fmt(total)}</span>
                    </div>
                    <div style={{background:BG,borderRadius:8,border:`1px solid ${BORDER}`,overflow:"hidden"}}>
                      {ms.items.map((item,i)=>(
                        <div key={item.label} style={{display:"flex",justifyContent:"space-between",padding:"9px 12px",borderBottom:i<ms.items.length-1?`1px solid ${BORDER}`:"none",alignItems:"center"}}>
                          <span style={{fontSize:12,color:TEXT}}>{item.label}</span>
                          <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:MUTED}}>{fmt(item.amount)}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}

              {ins.julyShortfall>0 ? (
                <div style={{background:`${RED}10`,border:`1px solid ${RED}33`,borderRadius:10,padding:"14px"}}>
                  <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>⚠ How to Cover the Shortfall</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <div style={{background:BG,borderRadius:8,padding:"12px"}}>
                      <div style={{fontSize:10,color:MUTED,marginBottom:4}}>Option A · Frontload</div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color:YELLOW,fontSize:15}}>+{fmt(ins.extraMonthly)}/mo</div>
                      <div style={{fontSize:11,color:MUTED,marginTop:4}}>Extra Apr–Jul on top of SGD 540</div>
                    </div>
                    <div style={{background:BG,borderRadius:8,padding:"12px"}}>
                      <div style={{fontSize:10,color:MUTED,marginBottom:4}}>Option B · Bonus Top-up</div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color:PURPLE,fontSize:15}}>{fmt(ins.julyShortfall)}</div>
                      <div style={{fontSize:11,color:MUTED,marginTop:4}}>One-time from April bonus</div>
                    </div>
                  </div>
                </div>
              ) : (
                <div style={{background:`${GREEN}10`,border:`1px solid ${GREEN}33`,borderRadius:10,padding:"12px 14px",fontSize:13,color:GREEN}}>✓ Your projected balance covers all premiums.</div>
              )}
            </div>
          )}
        </div>
      )}

      <button onClick={()=>{if(window.confirm("Reset all funds to opening balances?"))setFunds(initFunds());}}
        style={{width:"100%",background:"none",border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px",color:MUTED,fontSize:12,cursor:"pointer",marginBottom:8}}>
        Reset to Opening Balances
      </button>

      {/* Modal */}
      {modal && (
        <div style={{position:"fixed",inset:0,background:"#000000CC",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}} onClick={e=>e.target===e.currentTarget&&closeModal()}>
          <div style={{background:CARD,borderRadius:"20px 20px 0 0",padding:"24px 20px 48px",width:"100%",maxWidth:500}}>
            <div style={{width:36,height:4,borderRadius:2,background:BORDER,margin:"0 auto 20px"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div>
                <div style={{fontSize:17,fontWeight:700}}>{modal.type==="deposit"?"💰 Add Money":"💸 Use Funds"}</div>
                <div style={{fontSize:12,color:MUTED,marginTop:2}}>{FUND_META.find(f=>f.id===modal.fundId).name} · {fmt(funds[modal.fundId].balance)}</div>
              </div>
              <button onClick={closeModal} style={{background:BORDER,border:"none",borderRadius:"50%",width:32,height:32,color:TEXT,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Amount (SGD) *</div>
                <input type="number" inputMode="decimal" placeholder="0.00" value={form.amount} onChange={e=>{setForm(f=>({...f,amount:e.target.value}));setFormError("");}} style={inp({fontSize:24,fontFamily:"'DM Mono',monospace",padding:"14px",textAlign:"center"})} autoFocus />
              </div>
              <div>
                <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Note</div>
                <input placeholder={modal.type==="deposit"?"e.g. Monthly top-up":"e.g. GE Whole Life premium"} value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={inp()} />
              </div>
              <div>
                <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Date</div>
                <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inp({colorScheme:"dark"})} />
              </div>
              {formError && <div style={{fontSize:13,color:RED,padding:"8px 12px",background:`${RED}15`,borderRadius:8}}>{formError}</div>}
            </div>
            <button onClick={submitTxn} style={{width:"100%",marginTop:20,padding:"16px",borderRadius:12,border:"none",background:modal.type==="deposit"?GREEN:RED,color:"#0F1117",fontWeight:700,fontSize:16,cursor:"pointer"}}>
              {modal.type==="deposit"?"Confirm Deposit":"Confirm Withdrawal"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── BONUS ALLOCATION ────────────────────────────────────────────────────────

const DEFAULT_BONUSES = [{
  id: 1,
  name: "Annual Bonus",
  month: "April",
  salary: 11225,
  multiplier: 11.5,
  grossBonus: 129087.50,
  cashReceived: 32271.88,
  items: [
    {id:101,label:"Mom",category:"Family",value:3000,color:"#A78BD4"},
    {id:102,label:"CPF SA Top-up",category:"Retirement",value:4000,color:"#5BC8A0"},
    {id:103,label:"Treat loved ones",category:"Personal",value:1000,color:"#F4845F"},
    {id:104,label:"Korea & Australia trip",category:"Travel",value:5000,color:"#E8C547"},
  ],
}];

function BonusDetail({bonus, onChange}) {
  const [editingParams, setEditingParams] = useState(false);
  const [adding, setAdding]               = useState(false);
  const [editingId, setEditingId]         = useState(null);
  const [newLabel, setNewLabel]           = useState("");
  const [newCat, setNewCat]               = useState("");
  const [newVal, setNewVal]               = useState("");

  const {name, month, cashReceived, items, type="cash", rsuUnits=0, rsuPrice=0} = bonus;
  const isRSU = type === "rsu";
  const grossRSU = isRSU ? rsuUnits * rsuPrice : 0;

  const totalSetAside = items.reduce((s,i)=>s+i.value,0);
  const remaining     = cashReceived - totalSetAside;
  const over          = remaining < 0;
  const pct           = n => cashReceived > 0 ? ((n/cashReceived)*100).toFixed(1)+"%" : "0%";

  const upd     = (field, val) => onChange({...bonus, [field]: val});
  const updItem = (id, field, val) => onChange({...bonus, items: items.map(i=>i.id===id?{...i,[field]:field==="value"?parseFloat(val)||0:val}:i)});
  const removeItem = id => onChange({...bonus, items: items.filter(i=>i.id!==id)});
  const addItem = () => {
    const val = parseFloat(newVal);
    if (!newLabel.trim()||isNaN(val)||val<=0) return;
    onChange({...bonus, items:[...items,{id:Date.now(),label:newLabel.trim(),category:newCat.trim()||"Other",value:val,color:PALETTE[items.length%PALETTE.length]}]});
    setNewLabel(""); setNewCat(""); setNewVal(""); setAdding(false);
  };

  const fs = {background:"#0A0D14",border:`1px solid ${BORDER}`,borderRadius:8,color:TEXT,fontSize:15,padding:"10px 12px",fontFamily:"inherit",outline:"none",boxSizing:"border-box",width:"100%"};

  return (
    <div>
      {/* Header card */}
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderTop:`3px solid ${isRSU?PURPLE:YELLOW}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            {isRSU && (
              <div style={{display:"flex",gap:12,marginBottom:8}}>
                <div>
                  <div style={{fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>Units Vested</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:16,color:PURPLE}}>{rsuUnits.toLocaleString()}</div>
                </div>
                <div style={{color:MUTED,alignSelf:"flex-end",marginBottom:2,fontSize:13}}>×</div>
                <div>
                  <div style={{fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>Price/Unit</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:16,color:PURPLE}}>SGD {rsuPrice.toFixed(2)}</div>
                </div>
                <div style={{color:MUTED,alignSelf:"flex-end",marginBottom:2,fontSize:13}}>=</div>
                <div>
                  <div style={{fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>Gross Value</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:16,color:PURPLE}}>{fmt(grossRSU)}</div>
                </div>
              </div>
            )}

  );

function YearSummary({bonuses}) {
  const totalCash     = bonuses.reduce((s,b)=>s+b.cashReceived, 0);
  const totalSetAside = bonuses.reduce((s,b)=>s+b.items.reduce((x,i)=>x+i.value,0), 0);
  const totalInvest   = Math.max(totalCash - totalSetAside, 0);

  // Aggregate set-aside items by category across all bonuses
  const catMap = {};
  bonuses.forEach(b => b.items.forEach(item => {
    const key = item.category||"Other";
    if (!catMap[key]) catMap[key] = {total:0, color:item.color};
    catMap[key].total += item.value;
  }));
  const cats = Object.entries(catMap).sort((a,b)=>b[1].total-a[1].total);

  // SVG donut chart
  const DonutChart = () => {
    if (totalCash <= 0) return null;
    const cx=100, cy=100, r=72, stroke=28;
    const circumference = 2 * Math.PI * r;
    const segments = [
      ...cats.map(([label,{total,color}])=>({label, value:total, color})),
      {label:"Investment", value:totalInvest, color:GREEN},
    ].filter(s=>s.value>0);
    let offset = 0;
    const gap = 1.5; // degrees gap between segments
    return (
      <svg viewBox="0 0 200 200" style={{width:180,height:180,display:"block",margin:"0 auto"}}>
        {segments.map((seg,i)=>{
          const pct = seg.value / totalCash;
          const dashLen = Math.max((pct * circumference) - (gap/360*circumference), 0);
          const dashOffset = -offset * circumference;
          offset += pct;
          return (
            <circle key={i} cx={cx} cy={cy} r={r}
              fill="none" stroke={seg.color} strokeWidth={stroke}
              strokeDasharray={`${dashLen} ${circumference - dashLen}`}
              strokeDashoffset={dashOffset}
              style={{transform:"rotate(-90deg)",transformOrigin:"100px 100px",transition:"stroke-dasharray 0.5s ease"}}
            />
          );
        })}
        {/* Centre text */}
        <text x={cx} y={cy-8} textAnchor="middle" fill="#7A8099" fontSize="10" fontFamily="DM Sans">Total Cash</text>
        <text x={cx} y={cy+8} textAnchor="middle" fill="#E8EAF0" fontSize="13" fontWeight="700" fontFamily="DM Mono">{fmt(totalCash).replace("SGD ","")}</text>
        <text x={cx} y={cy+22} textAnchor="middle" fill="#5BC8A0" fontSize="10" fontFamily="DM Sans">SGD</text>
      </svg>
    );
  };

  return (
    <div>
      {/* Donut chart card */}
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"16px",marginBottom:12}}>
        <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>2026 Bonus Overview</div>
        <DonutChart />

        {/* Legend */}
        <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:8}}>
          {[...cats.map(([label,{total,color}])=>({label,value:total,color})),
            {label:"Available to Invest",value:totalInvest,color:GREEN}
          ].map(({label,value,color})=>(
            <div key={label} style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:color,flexShrink:0}}/>
                <span style={{fontSize:13,color:MUTED}}>{label}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:MUTED}}>{totalCash>0?((value/totalCash)*100).toFixed(0):0}%</span>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:600,color:TEXT}}>{fmt(value)}</span>
              </div>
            </div>
          ))}
        </div>

        {/* Totals footer */}
        <div style={{borderTop:`1px solid ${BORDER}`,marginTop:12,paddingTop:12,display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:MUTED}}>Total Cash Received</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,color:YELLOW}}>{fmt(totalCash)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:MUTED}}>Total Set-asides</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,color:RED}}>−{fmt(totalSetAside).replace("SGD ","")}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:GREEN,fontWeight:600}}>Available to Invest</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:GREEN}}>{fmt(totalInvest)}</span>
          </div>
        </div>
      </div>

      {/* Combined set-asides by category */}
      {cats.length>0&&(
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,overflow:"hidden",marginBottom:8}}>
          <div style={{padding:"10px 16px",borderBottom:`1px solid ${BORDER}`,fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em"}}>
            Combined Set-asides by Category
          </div>
          {cats.map(([cat,{total,color}],i)=>{
            const barPct = totalCash>0?(total/totalCash)*100:0;
            return (
              <div key={cat} style={{padding:"12px 16px",borderBottom:i<cats.length-1?`1px solid ${BORDER}`:"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:color}}/>
                    <span style={{fontSize:13,color:MUTED}}>{cat}</span>
                  </div>
                  <div>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:600,color:TEXT}}>{fmt(total)}</span>
                    <span style={{fontSize:11,color:MUTED,marginLeft:6}}>{barPct.toFixed(0)}%</span>
                  </div>
                </div>
                <div style={{height:4,borderRadius:2,background:BORDER,overflow:"hidden"}}>
                  <div style={{width:`${barPct}%`,height:"100%",background:color,borderRadius:2,transition:"width 0.4s ease"}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function BonusAllocation() {
  const [bonuses, setBonuses] = useState(() => {
    try { const s=localStorage.getItem("bonus-allocation-v2"); return s?JSON.parse(s):DEFAULT_BONUSES; } catch { return DEFAULT_BONUSES; }
  });
  const [activeId, setActiveId] = useState("summary");
  const [addingBonus, setAddingBonus] = useState(false);
  const [newBonusName, setNewBonusName] = useState("");
  const [newBonusMonth, setNewBonusMonth] = useState("");

  useEffect(()=>{ try { localStorage.setItem("bonus-allocation-v2", JSON.stringify(bonuses)); } catch {} }, [bonuses]);

  const updateBonus = (updated) => setBonuses(prev=>prev.map(b=>b.id===updated.id?updated:b));
  const deleteBonus = (id) => { setBonuses(prev=>prev.filter(b=>b.id!==id)); setActiveId("summary"); };
  const createBonus = () => {
    if (!newBonusName.trim()) return;
    const nb = {id:Date.now(),name:newBonusName.trim(),month:newBonusMonth.trim()||"2026",grossBonus:0,cashReceived:0,salary:0,multiplier:0,items:[]};
    setBonuses(prev=>[...prev,nb]);
    setActiveId(nb.id);
    setAddingBonus(false); setNewBonusName(""); setNewBonusMonth("");
  };

  const tabs = [{id:"summary",label:"📊 Year",color:BLUE}, ...bonuses.map(b=>({id:b.id,label:b.name,color:YELLOW}))];
  const activeBonus = bonuses.find(b=>b.id===activeId);

  const fieldStyle = {background:"#0A0D14",border:`1px solid ${BORDER}`,borderRadius:8,color:TEXT,fontSize:15,padding:"10px 12px",fontFamily:"inherit",outline:"none",boxSizing:"border-box",width:"100%"};

  return (
    <div style={{padding:"16px 16px 8px"}}>

      {/* Horizontal scroll tabs */}
      <div style={{display:"flex",gap:8,marginBottom:14,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setActiveId(t.id)} style={{
            flexShrink:0,padding:"8px 14px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:12,whiteSpace:"nowrap",
            border:`1px solid ${activeId===t.id?t.color:BORDER}`,
            background:activeId===t.id?`${t.color}18`:"none",
            color:activeId===t.id?t.color:MUTED,
          }}>{t.label}</button>
        ))}
        <button onClick={()=>setAddingBonus(p=>!p)} style={{
          flexShrink:0,padding:"8px 14px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:12,
          border:`1px solid ${addingBonus?GREEN:BORDER}`,background:addingBonus?`${GREEN}18`:"none",color:addingBonus?GREEN:MUTED,
        }}>+ Add</button>
      </div>

      {/* Add bonus form */}
      {addingBonus&&(
        <div style={{background:CARD,border:`1px solid ${GREEN}44`,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:600,color:GREEN,marginBottom:12}}>New Bonus</div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Bonus name *</div>
            <input placeholder="e.g. RSU Vest, Mid-year Bonus" value={newBonusName} onChange={e=>setNewBonusName(e.target.value)} style={fieldStyle} autoFocus />
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Month received</div>
            <input placeholder="e.g. October" value={newBonusMonth} onChange={e=>setNewBonusMonth(e.target.value)} style={fieldStyle} />
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={createBonus} style={{flex:1,padding:"11px",borderRadius:8,border:"none",background:GREEN,color:"#0F1117",fontWeight:700,fontSize:14,cursor:"pointer"}}>Create</button>
            <button onClick={()=>{setAddingBonus(false);setNewBonusName("");setNewBonusMonth("");}} style={{padding:"11px 16px",borderRadius:8,border:`1px solid ${BORDER}`,background:"none",color:MUTED,fontSize:14,cursor:"pointer"}}>Cancel</button>
          </div>
        </div>
      )}

      {/* Summary view */}
      {activeId==="summary" && <YearSummary bonuses={bonuses} />}

      {/* Individual bonus view */}
      {activeBonus && (
        <>
          <BonusDetail bonus={activeBonus} onChange={updateBonus} />
          {bonuses.length>1&&(
            <button onClick={()=>{if(window.confirm(`Delete "${activeBonus.name}"? This cannot be undone.`))deleteBonus(activeBonus.id);}}
              style={{width:"100%",background:"none",border:`1px solid ${RED}44`,borderRadius:8,padding:"10px",color:RED,fontSize:12,cursor:"pointer",fontFamily:"inherit",marginTop:4,marginBottom:8}}>
              🗑 Delete {activeBonus.name}
            </button>
          )}
        </>
      )}
    </div>
  );
}

const FLEX_CATS = [
  {id:"food",     label:"Food & Groceries",                      icon:"🍜"},
  {id:"beauty",   label:"Beauty",                                icon:"💅"},
  {id:"shopping", label:"Shopping",                              icon:"🛍️"},
  {id:"home_ent", label:"Home, Entertainment, Sports, Personal", icon:"🎮"},
  {id:"cab",      label:"Cab",                                   icon:"🚕"},
  {id:"gifts",    label:"Gifts",                                 icon:"🎁"},
];

// Built-in defaults — flex is derived automatically
const DEFAULT_BUDGET = (m) => ({
  income:    11420,
  rent:      1807.28,
  tax:       m <= 3 ? 1354 : 1410,
  insurance: 540,
  nonneg:    571.12,
  gym:       463,
  travel:    800,
  savings:   3600,
  extra:     0,
});
const calcFlex = (b) => Math.round((b.income + b.extra - b.rent - b.tax - b.insurance - b.nonneg - b.gym - b.travel - b.savings) * 100) / 100;

// Carry-forward: find effective budget for a month by applying all overrides
// from month 0 up to monthIdx in order (later overrides win)
const getEffectiveBudget = (overrides, monthIdx) => {
  const base = DEFAULT_BUDGET(monthIdx);
  for (let m = 0; m <= monthIdx; m++) {
    if (overrides[m]) Object.assign(base, overrides[m]);
  }
  return base;
};

const BUDGET_ROWS = [
  {id:"income",    label:"Income",            icon:"💵", color:"#5BC8A0", isIncome:true},
  {id:"extra",     label:"Extra Income",      icon:"🎉", color:"#5BC8A0", isIncome:true, hint:"Windfalls, bonuses, one-offs"},
  {id:"rent",      label:"Rent",              icon:"🏠", color:"#A78BD4"},
  {id:"tax",       label:"Income Tax",        icon:"📋", color:"#E8547A"},
  {id:"insurance", label:"Insurance",         icon:"🛡️", color:"#5B8DB8"},
  {id:"nonneg",    label:"Non-negotiables",   icon:"📌", color:"#5BC8A0", hint:"Utilities · Parents · Transport · Digital Subs"},
  {id:"gym",       label:"Gym",               icon:"🏋️", color:"#E8C547"},
  {id:"travel",    label:"Travel Fund",       icon:"✈️", color:"#F4845F"},
  {id:"savings",   label:"Savings & Invest.", icon:"📈", color:"#5B8DB8"},
];

const initSpending = () => {
  const d = {};
  for (let m = 0; m < 12; m++) d[m] = {food:"",beauty:"",shopping:"",home_ent:"",cab:"",gifts:""};
  return d;
};

function MonthlyTracker() {
  const [monthIdx,  setMonthIdx]  = useState(new Date().getMonth());
  const [activeTab, setActiveTab] = useState("spending");

  const [overrides, setOverrides] = useState(() => {
    try { const s = localStorage.getItem("budget-overrides"); return s ? JSON.parse(s) : {}; } catch { return {}; }
  });
  const [spending, setSpending] = useState(() => {
    try { const s = localStorage.getItem("monthly-tracker"); return s ? JSON.parse(s) : initSpending(); } catch { return initSpending(); }
  });

  useEffect(() => { try { localStorage.setItem("budget-overrides", JSON.stringify(overrides)); } catch {} }, [overrides]);
  useEffect(() => { try { localStorage.setItem("monthly-tracker",  JSON.stringify(spending));  } catch {} }, [spending]);

  const budget     = getEffectiveBudget(overrides, monthIdx);
  const flexBudget = calcFlex(budget);
  const spendData  = spending[monthIdx] || {};
  const isModified = !!overrides[monthIdx];

  // Update budget: stores override on this month only; carry-forward happens via getEffectiveBudget
  const setBudgetVal = (id, raw) => {
    const val = parseFloat(raw);
    if (isNaN(val) || val < 0) return;
    setOverrides(prev => ({...prev, [monthIdx]: {...(prev[monthIdx]||{}), [id]: val}}));
  };
  const setSpendVal = (id, val) => setSpending(prev => ({...prev, [monthIdx]: {...(prev[monthIdx]||{}), [id]: val}}));

  const totalSpent = FLEX_CATS.reduce((s,c) => s + (parseFloat(spendData[c.id])||0), 0);
  const totalLeft  = flexBudget - totalSpent;
  const anySpend   = FLEX_CATS.some(c => parseFloat(spendData[c.id]) > 0);
  const pctUsed    = flexBudget > 0 ? Math.min((totalSpent/flexBudget)*100, 100) : 0;

  const inp = (val, onChange, color) => (
    <input type="number" inputMode="decimal" value={val} onChange={e=>onChange(e.target.value)}
      style={{background:"#0A0D14",border:`1px solid #252A3A`,borderRadius:8,color:color||"#E8EAF0",
        fontSize:15,fontFamily:"'DM Mono',monospace",padding:"8px 10px",width:128,textAlign:"right",outline:"none",flexShrink:0}} />
  );

  return (
    <div style={{padding:"16px 16px 8px"}}>

      {/* Month selector */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,background:"#181C27",borderRadius:12,padding:"12px 16px",border:"1px solid #252A3A"}}>
        <button onClick={()=>setMonthIdx(m=>Math.max(0,m-1))} style={{background:"none",border:"1px solid #252A3A",borderRadius:8,width:38,height:38,color:"#E8EAF0",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontWeight:700,fontSize:20}}>{MONTHS[monthIdx]} 2026</div>
          <div style={{marginTop:4,minHeight:18}}>
            {isModified
              ? <span style={{fontSize:10,color:"#E8C547",background:"#E8C54718",padding:"2px 8px",borderRadius:10}}>✎ Budget edited</span>
              : <span style={{fontSize:11,color:"#7A8099"}}>Default budget</span>}
          </div>
        </div>
        <button onClick={()=>setMonthIdx(m=>Math.min(11,m+1))} style={{background:"none",border:"1px solid #252A3A",borderRadius:8,width:38,height:38,color:"#E8EAF0",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      </div>

      {/* Tab switcher */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {[{id:"spending",label:"💸 Spending"},{id:"budget",label:"⚙️ Budget"}].map(t=>(
          <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{
            flex:1,padding:"10px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13,
            border:`1px solid ${activeTab===t.id?"#E8C547":"#252A3A"}`,
            background:activeTab===t.id?"#E8C54718":"none",
            color:activeTab===t.id?"#E8C547":"#7A8099",
          }}>{t.label}</button>
        ))}
      </div>

      {/* ── SPENDING TAB ── */}
      {activeTab==="spending" && <>

        {/* Flex summary */}
        <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,padding:"16px",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:12}}>
            <div>
              <div style={{fontSize:11,color:"#7A8099",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Flexible Spending</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:700,color:totalSpent>flexBudget?"#E85454":"#E8EAF0"}}>{fmt(totalSpent)}</div>
              <div style={{fontSize:12,color:"#7A8099",marginTop:3}}>of <span style={{fontFamily:"'DM Mono',monospace",color:"#E8EAF0"}}>{fmt(flexBudget)}</span> budget</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"#7A8099",marginBottom:3}}>Remaining</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:totalLeft>=0?"#5BC8A0":"#E85454"}}>
                {totalLeft>=0?fmt(totalLeft):`−${fmt(Math.abs(totalLeft))}`}
              </div>
            </div>
          </div>
          <div style={{height:8,borderRadius:4,background:"#252A3A",overflow:"hidden"}}>
            <div style={{width:`${pctUsed}%`,height:"100%",borderRadius:4,transition:"width 0.4s ease",
              background:totalSpent>flexBudget?"#E85454":pctUsed>85?"#F4845F":"#5BC8A0"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:"#7A8099"}}>
            <span>SGD 0</span><span>{Math.round(pctUsed)||0}% used</span><span>{fmt(flexBudget)}</span>
          </div>
        </div>

        {/* Spending rows */}
        <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,overflow:"hidden",marginBottom:12}}>
          <div style={{padding:"10px 16px",borderBottom:"1px solid #252A3A",fontSize:10,color:"#7A8099",textTransform:"uppercase",letterSpacing:"0.08em",display:"flex",justifyContent:"space-between"}}>
            <span>Category</span><span>Spent this month</span>
          </div>
          {FLEX_CATS.map((cat,i)=>{
            const spent = parseFloat(spendData[cat.id])||0;
            const sharePct = totalSpent>0?Math.round((spent/totalSpent)*100):0;
            return (
              <div key={cat.id} style={{padding:"12px 16px",borderBottom:i<FLEX_CATS.length-1?"1px solid #252A3A":"none",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16,flexShrink:0}}>{cat.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>{cat.label}</div>
                  <div style={{height:4,borderRadius:2,background:"#252A3A",overflow:"hidden"}}>
                    <div style={{width:`${sharePct}%`,height:"100%",background:"#E8C547",borderRadius:2,transition:"width 0.3s ease"}}/>
                  </div>
                  {spent>0&&<div style={{fontSize:10,color:"#7A8099",marginTop:3}}>{sharePct}% of total spending</div>}
                </div>
                {inp(spendData[cat.id]||"", v=>setSpendVal(cat.id,v))}
              </div>
            );
          })}
          <div style={{padding:"12px 16px",background:"#13161F",display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"2px solid #252A3A"}}>
            <span style={{fontSize:13,fontWeight:700}}>Total Spent</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:totalSpent>flexBudget?"#E85454":"#E8EAF0"}}>{fmt(totalSpent)}</span>
          </div>
        </div>

        {/* Full month snapshot */}
        <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,padding:"14px 16px",marginBottom:8}}>
          <div style={{fontSize:11,color:"#7A8099",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>Full Month Snapshot</div>
          {[
            {label:"Income",           value:budget.income,    color:"#5BC8A0"},
            ...(budget.extra>0?[{label:"🎉 Extra Income", value:budget.extra, color:"#5BC8A0"}]:[]),
            {label:"Rent",             value:budget.rent,      color:"#A78BD4"},
            {label:"Income Tax",       value:budget.tax,       color:"#E8547A"},
            {label:"Insurance",        value:budget.insurance, color:"#5B8DB8"},
            {label:"Non-negotiables",  value:budget.nonneg,    color:"#5BC8A0"},
            {label:"Gym",              value:budget.gym,       color:"#E8C547"},
            {label:"Flexible Spending",value:flexBudget, actual:anySpend?totalSpent:null, color:"#F4845F"},
            {label:"Travel Fund",      value:budget.travel,    color:"#F4845F"},
            {label:"Savings & Invest.",value:budget.savings,   color:"#5B8DB8"},
          ].map(({label,value,actual,color})=>(
            <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flex:1,minWidth:0}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:color,flexShrink:0}}/>
                <span style={{fontSize:12,color:"#7A8099"}}>{label}</span>
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                {actual!=null?(
                  <span>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:actual>value?"#E85454":"#5BC8A0"}}>{fmt(actual)}</span>
                    <span style={{fontSize:10,color:"#7A8099"}}> / {fmt(value)}</span>
                  </span>
                ):(
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:label.includes("Income")?"#5BC8A0":"#E8EAF0"}}>{fmt(value)}</span>
                )}
              </div>
            </div>
          ))}
          <div style={{borderTop:"1px solid #252A3A",marginTop:6,paddingTop:10,display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,fontWeight:700}}>Total Income</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,color:"#5BC8A0"}}>{fmt(budget.income+(budget.extra||0))}</span>
          </div>
        </div>
      </>}

      {/* ── BUDGET TAB ── */}
      {activeTab==="budget" && <>
        <div style={{background:"#E8C54712",border:"1px solid #E8C54733",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#7A8099",lineHeight:1.6}}>
          ⚙️ Changes from <strong style={{color:"#E8EAF0"}}>{MONTHS[monthIdx]}</strong> carry forward to all later months automatically. Flexible spending adjusts to keep the budget balanced.
        </div>

        <div style={{background:"#181C27",border:"1px solid #252A3A",borderRadius:12,overflow:"hidden",marginBottom:12}}>
          {BUDGET_ROWS.map((row,i)=>(
            <div key={row.id} style={{
              padding:"13px 16px",
              borderBottom:i<BUDGET_ROWS.length-1?"1px solid #252A3A":"none",
              background:row.isIncome?"#0D1A140A":"none",
              display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,
            }}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:row.hint?3:0}}>
                  <span style={{fontSize:15}}>{row.icon}</span>
                  <span style={{fontSize:13,fontWeight:600,color:row.color}}>{row.label}</span>
                </div>
                {row.hint&&<div style={{fontSize:10,color:"#7A8099",paddingLeft:22}}>{row.hint}</div>}
              </div>
              {inp(budget[row.id]||"", v=>setBudgetVal(row.id, v), row.isIncome?"#5BC8A0":undefined)}
            </div>
          ))}
        </div>

        {/* Derived flex result */}
        <div style={{
          background:flexBudget<0?"#1F0D10":"#0D1F18",
          border:`1px solid ${flexBudget<0?"#E8545444":"#5BC8A044"}`,
          borderRadius:12,padding:"14px 16px",marginBottom:12,
          display:"flex",justifyContent:"space-between",alignItems:"center",
        }}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:flexBudget<0?"#E85454":"#5BC8A0"}}>🛍️ Flexible Spending Budget</div>
            <div style={{fontSize:11,color:"#7A8099",marginTop:3}}>Auto-calculated · Income minus all expenses</div>
            {flexBudget<0&&<div style={{fontSize:11,color:"#E85454",marginTop:4}}>⚠ Over by {fmt(Math.abs(flexBudget))} — reduce an expense above</div>}
          </div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:flexBudget<0?"#E85454":"#5BC8A0",flexShrink:0,marginLeft:12}}>{fmt(flexBudget)}</div>
        </div>

        {/* Reset this month */}
        {isModified&&(
          <button onClick={()=>{
            if(window.confirm(`Reset ${MONTHS[monthIdx]}'s budget to default?\n\nThis only affects ${MONTHS[monthIdx]} — earlier months and later months that inherited from here will re-compute from the previous override or default.`)){
              setOverrides(prev=>{const n={...prev};delete n[monthIdx];return n;});
            }
          }} style={{width:"100%",background:"none",border:"1px solid #252A3A",borderRadius:8,padding:"10px",color:"#7A8099",fontSize:12,cursor:"pointer",fontFamily:"inherit",marginBottom:8}}>
            ↩ Reset {MONTHS[monthIdx]} to inherited default
          </button>
        )}
      </>}

    </div>
  );
}


// ─── APP SHELL ───────────────────────────────────────────────────────────────
const TABS = [
  {id:"monthly", label:"Monthly",      icon:"📅"},
  {id:"sinking", label:"Sinking Funds",icon:"🪣"},
  {id:"bonus",   label:"Bonus",        icon:"💰"},
  {id:"settings",label:"Backup",       icon:"💾"},
];

function BackupRestore() {
  const [imported, setImported] = useState(false);
  const [error, setError] = useState("");

  const exportData = () => {
    const data = {
      version: "1.0.4",
      exported: new Date().toISOString(),
      "monthly-tracker":    localStorage.getItem("monthly-tracker"),
      "budget-overrides":   localStorage.getItem("budget-overrides"),
      "sf-funds":           localStorage.getItem("sf-funds"),
      "bonus-allocation":   localStorage.getItem("bonus-allocation"),
      "bonus-allocation-v2":localStorage.getItem("bonus-allocation-v2"),
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    const date = new Date().toISOString().split("T")[0];
    a.href     = url;
    a.download = `finance-backup-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    setError("");
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data["monthly-tracker"])     localStorage.setItem("monthly-tracker",     data["monthly-tracker"]);
        if (data["budget-overrides"])    localStorage.setItem("budget-overrides",    data["budget-overrides"]);
        if (data["sf-funds"])            localStorage.setItem("sf-funds",            data["sf-funds"]);
        if (data["bonus-allocation"])    localStorage.setItem("bonus-allocation",    data["bonus-allocation"]);
        if (data["bonus-allocation-v2"]) localStorage.setItem("bonus-allocation-v2",data["bonus-allocation-v2"]);
        setImported(true);
        setTimeout(() => window.location.reload(), 1200);
      } catch {
        setError("Invalid backup file. Please use a file exported from this app.");
      }
    };
    reader.readAsText(file);
  };

  return (
    <div style={{padding:"16px"}}>
      <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:16}}>Data Backup & Restore</div>

      {/* Export */}
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"18px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>📤</span>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>Export Backup</div>
            <div style={{fontSize:12,color:MUTED,marginTop:2}}>Save all your data as a file on your device</div>
          </div>
        </div>
        <div style={{fontSize:12,color:MUTED,marginBottom:14,lineHeight:1.6}}>
          This exports everything — your sinking fund transactions, bonus allocation, and all monthly spending figures — into a single backup file. Keep it somewhere safe like your Files app or email it to yourself.
        </div>
        <button onClick={exportData} style={{
          width:"100%", padding:"14px", borderRadius:10,
          border:"none", background:GREEN, color:"#0F1117",
          fontWeight:700, fontSize:15, cursor:"pointer", fontFamily:"inherit",
        }}>
          📥 Download Backup File
        </button>
      </div>

      {/* Import */}
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"18px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>📥</span>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>Restore from Backup</div>
            <div style={{fontSize:12,color:MUTED,marginTop:2}}>Load a previously exported backup file</div>
          </div>
        </div>
        <div style={{fontSize:12,color:MUTED,marginBottom:14,lineHeight:1.6}}>
          Select a backup file you exported earlier. This will restore all your data and reload the app. Your current data will be overwritten.
        </div>
        {imported ? (
          <div style={{padding:"12px",borderRadius:10,background:`${GREEN}18`,border:`1px solid ${GREEN}44`,color:GREEN,fontSize:13,fontWeight:600,textAlign:"center"}}>
            ✓ Data restored! Reloading...
          </div>
        ) : (
          <label style={{
            display:"block", width:"100%", padding:"14px", borderRadius:10,
            border:`2px dashed ${BORDER}`, color:MUTED, fontWeight:700,
            fontSize:15, cursor:"pointer", fontFamily:"inherit",
            textAlign:"center", boxSizing:"border-box",
          }}>
            📂 Choose Backup File
            <input type="file" accept=".json" onChange={importData} style={{display:"none"}} />
          </label>
        )}
        {error && <div style={{marginTop:10,padding:"10px 12px",borderRadius:8,background:`${RED}15`,color:RED,fontSize:12}}>{error}</div>}
      </div>

      {/* Tip */}
      <div style={{background:CARD,border:`1px solid ${YELLOW}33`,borderRadius:12,padding:"14px 16px"}}>
        <div style={{fontSize:12,color:YELLOW,fontWeight:600,marginBottom:6}}>💡 When to back up</div>
        <div style={{fontSize:12,color:MUTED,lineHeight:1.6}}>
          Back up after entering your monthly spending, after adding sinking fund transactions, or any time before clearing your browser data. Store it in iCloud, Google Drive, or email it to yourself.
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("monthly");

  return (
    <div style={{minHeight:"100vh",background:BG,color:TEXT,paddingBottom:80}}>
      {/* Top bar */}
      <div style={{position:"sticky",top:0,zIndex:50,background:CARD,borderBottom:`1px solid ${BORDER}`,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:10,color:MUTED,letterSpacing:"0.1em",textTransform:"uppercase"}}>Personal Finance</div>
          <div style={{fontSize:17,fontWeight:700,letterSpacing:"-0.01em"}}>{TABS.find(t=>t.id===tab)?.icon} {TABS.find(t=>t.id===tab)?.label}</div>
        </div>
        <div style={{fontSize:11,color:MUTED}}>2026</div>
      </div>

      {tab==="monthly"  && <MonthlyTracker />}
      {tab==="sinking"  && <SinkingFunds />}
      {tab==="bonus"    && <BonusAllocation />}
      {tab==="settings" && <BackupRestore />}

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:CARD,borderTop:`1px solid ${BORDER}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {TABS.map(t=>{
          const active = tab===t.id;
          return (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 8px 10px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,borderTop:`2px solid ${active?YELLOW:"transparent"}`}}>
              <span style={{fontSize:20}}>{t.icon}</span>
              <span style={{fontSize:10,fontWeight:600,color:active?YELLOW:MUTED,letterSpacing:"0.04em"}}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
// ─── AUTO-UPDATING SERVICE WORKER ────────────────────────────────────────────
// Bump this version number every time the file is updated.
// The app will detect the change and refresh automatically in the background.
const APP_VERSION = "1.2.2";

if ('serviceWorker' in navigator) {
  // Inline the service worker as a blob so we don't need a separate sw.js file
  const swCode = `
    const VERSION = "${APP_VERSION}";
    const CACHE = "finance-tracker-" + VERSION;

    self.addEventListener("install", e => {
      // Take over immediately without waiting
      self.skipWaiting();
    });

    self.addEventListener("activate", e => {
      // Delete all old caches that don't match current version
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(
            keys.filter(k => k !== CACHE).map(k => caches.delete(k))
          )
        ).then(() => self.clients.claim())
      );
    });

    self.addEventListener("fetch", e => {
      // Always go to network first, fall back to cache
      // This ensures updates are picked up immediately
      e.respondWith(
        fetch(e.request)
          .then(res => {
            // Cache a copy of the response
            const clone = res.clone();
            caches.open(CACHE).then(cache => cache.put(e.request, clone));
            return res;
          })
          .catch(() => caches.match(e.request))
      );
    });

    // Tell all open tabs to reload when a new version activates
    self.addEventListener("message", e => {
      if (e.data === "skipWaiting") self.skipWaiting();
    });
  `;

  const blob = new Blob([swCode], {type: "application/javascript"});
  const swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl).then(reg => {
    // When a new service worker is waiting, reload the page to apply it
    reg.addEventListener("updatefound", () => {
      const newWorker = reg.installing;
      newWorker.addEventListener("statechange", () => {
        if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
          // New version available — reload silently to apply update
          newWorker.postMessage("skipWaiting");
          window.location.reload();
        }
      });
    });

    // Check for updates every time the app is opened or comes to foreground
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") reg.update();
    });
  }).catch(err => console.log("SW registration failed:", err));
}
</script>
